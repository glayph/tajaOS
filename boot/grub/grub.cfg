# ============================================================
#  NEXUS OS — GRUB Boot Configuration
# ============================================================

# Load essential modules explicitly (fallback if grub-mkrescue core is minimal)
insmod all_video
insmod gfxterm
insmod iso9660
insmod search_label
insmod echo
insmod linux
insmod initrd
insmod chain
insmod part_msdos
insmod part_gpt

set default=0
set timeout=5

# Find ISO root by volume label (fallback to cd0 if not found)
search --no-floppy --label --set=root "NEXUS_OS_1_0"
if [ -z "$root" ]; then
    set root=(cd0)
fi

menuentry "NEXUS OS 1.0" {
    linux  /boot/vmlinuz \
           boot=live \
           components \
           quiet \
           hostname=nexus \
           username=root \
           noswap
    initrd /boot/initrd.img
}

menuentry "NEXUS OS — Safe Mode (no splash)" {
    linux  /boot/vmlinuz \
           boot=live \
           components \
           hostname=nexus \
           noswap
    initrd /boot/initrd.img
}

menuentry "NEXUS OS — RAM Mode (toram)" {
    linux  /boot/vmlinuz \
           boot=live \
           components \
           toram \
           hostname=nexus \
           noswap
    initrd /boot/initrd.img
}

menuentry "Boot from first hard disk" {
    insmod chain
    set root=(hd0,msdos1)
    chainloader +1
}
