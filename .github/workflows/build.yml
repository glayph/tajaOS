name: Build TajaOS ISO

on:
  push:
    branches: [main]
    paths:
      - 'taja-agent.py'
      - 'taja-setup.sh'
      - 'boot/**'
      - 'skills/**'
      - 'bin/**'
      - 'config/**'
      - 'customize/**'
      - 'makebuild.sh'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache rootfs
        uses: actions/cache@v4
        with:
          path: rootfs
          key: tajaos-rootfs-${{ hashFiles('boot/**', 'customize/**', 'bin/**', 'skills/**', 'config/**', 'install-deps.sh', 'taja-setup.sh', 'taja-agent.py', 'makebuild.sh', 'taja-doctor', 'taja-monitor', 'taja-pkg', 'taja-skill') }}
          restore-keys: |
            tajaos-rootfs-

      - name: Install dependencies
        run: sudo bash install-deps.sh

      - name: Build TajaOS ISO
        run: sudo bash makebuild.sh --output ${{ github.workspace }}

      - name: ISO info
        run: |
          ls -lh tajaos.iso
          sha256sum tajaos.iso | tee SHA256SUMS

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "TajaOS v2.0.${{ github.run_number }}"
          body: |
            Download tajaos.iso below and flash to USB or boot in a VM.
            Flash: sudo dd if=tajaos.iso of=/dev/sdX bs=4M status=progress

            What's new:
            - Complete TajaOS system with unified 'os' command
            - TajaNet - network manager with Wi-Fi, Ethernet, VPN, DNS, proxy, firewall
            - TajaInit - service manager with health monitoring
            - TajaPkg - package manager with offline cache
            - TajaDev - containers, VMs, templates
            - TajaAI - local LLM and code generation
            - TajaSec - encrypted vault, hardening, audit
            - TajaPersist - persistence manager with snapshots
            - Tajamon - system monitoring dashboard
            - TajaShell - TUI with keyboard navigation
            - TajaRecover - recovery tools and system health
            - TajaMedia - media conversion, OCR, QR, benchmarks
            - TajaBuild - ISO build and release pipeline
          files: |
            tajaos.iso
            SHA256SUMS
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
