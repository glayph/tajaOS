name: Build Nexus OS ISO

on:
  push:
    branches: [main]
    paths: [nexus-agent.py, boot/**, customize/**, makebuild.sh]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo bash install-deps.sh

      - name: Build nexus.iso
        run: sudo bash makebuild.sh

      - name: Show ISO info
        run: |
          ls -lh nexus.iso
          sha256sum nexus.iso | tee SHA256SUMS

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: "Nexus OS v1.0"
          body: |
            Download nexus.iso below and flash to USB or boot in a VM.
            Flash: sudo dd if=nexus.iso of=/dev/sdX bs=4M status=progress
          files: |
            nexus.iso
            SHA256SUMS
          make_latest: true
          overwrite: true
          token: ${{ secrets.GITHUB_TOKEN }}
